{% extends "base.html" %}
{% block title %}404 – Page Not Found{% endblock %}

<div class="min-h-screen flex items-center justify-center px-4 pt-16">

    <div class="text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-violet-500 mb-4">404</div>
