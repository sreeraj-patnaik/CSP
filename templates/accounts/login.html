{% extends "base.html" %}
{% load static %}

{% block title %}Login – CSP{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-16">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-accent-400 to-cyan-600 flex items-center justify-center mx-auto mb-4 shadow-glow-md">
        <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Admin Login</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to manage the CSP portal</p>
    </div>

    <div class="glass-card rounded-2xl border border-white/5 p-8">
      {% if messages %}
      <div class="mb-4 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
        {% for message in messages %}{{ message }}{% endfor %}
      </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ request.GET.next }}">

        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
          <input type="text" name="username" required autocomplete="username"
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-accent-500 transition-colors text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
          <input type="password" name="password" required autocomplete="current-password"
                 class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-slate-200 placeholder-slate-600 focus:outline-none focus:border-accent-500 transition-colors text-sm">
        </div>
        <button type="submit"
                class="w-full py-3 bg-accent-500 hover:bg-accent-400 text-white font-semibold rounded-xl transition-all text-sm">
          Sign In
        </button>
      </form>
    </div>
    <p class="text-center mt-6 text-xs text-slate-600">
      <a href="/" class="hover:text-slate-400 transition-colors">← Back to Portal</a>
    </p>
  </div>
</div>
{% endblock %}
