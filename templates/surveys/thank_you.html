{% extends "base.html" %}
{% block title %}Thank You – CSP Survey{% endblock %}

<div class="min-h-screen flex items-center justify-center px-4 pt-16">

    <div class="w-20 h-20 rounded-3xl bg-emerald-500/20 border border-emerald-500/30 flex items-center justify-center mx-auto mb-6 text-4xl">✅</div>

      <a href="{% url 'core:home' %}" class="px-8 py-3 bg-accent-500 hover:bg-accent-400 text-white font-medium rounded-xl transition-all">

      </a>
